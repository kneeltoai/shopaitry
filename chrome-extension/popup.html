<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Shopaitry</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── Main view ── -->
  <div id="main-view" class="view active">
    <header class="header">
      <span class="logo">🔖 Shopaitry</span>
      <button id="settings-btn" class="icon-btn" title="설정" aria-label="설정">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </header>

    <div class="product-card">
      <img id="product-image" class="product-image" src="" alt="" style="display:none">
      <div class="product-fields">
        <input id="title-input" class="field-input" type="text" placeholder="상품명">
        <div class="price-row">
          <input id="price-input" class="field-input price-input" type="text" inputmode="numeric" placeholder="가격">
          <span class="currency-label">원</span>
        </div>
        <span id="product-site" class="product-site"></span>
      </div>
    </div>

    <div id="status" class="status" role="status" aria-live="polite"></div>

    <div class="board-row">
      <label class="board-label" for="board-select">보드</label>
      <select id="board-select" class="board-select">
        <option value="">선택 안 함</option>
      </select>
    </div>

    <div class="actions">
      <button id="save-btn" class="btn btn-primary">저장하기</button>
    </div>
  </div>

  <!-- ── Success view ── -->
  <div id="success-view" class="view">
    <div class="success-content">
      <div class="success-icon">✓</div>
      <p class="success-title">저장 완료!</p>
      <p class="success-sub">Shopaitry에 저장되었어요</p>
      <button id="open-app-btn" class="btn btn-outline success-open-btn">앱에서 보기 →</button>
    </div>
  </div>

  <!-- ── Settings view ── -->
  <div id="settings-view" class="view">
    <header class="header">
      <button id="back-btn" class="back-btn" aria-label="뒤로">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        설정
      </button>
    </header>

    <div class="settings-body">
      <div class="field-group">
        <label class="field-label" for="api-key-input">API 키</label>
        <input id="api-key-input" class="field-input" type="password" placeholder="sk_live_..." autocomplete="off">
        <p class="field-hint">Shopaitry → 설정 → API 키에서 발급받으세요</p>
      </div>

      <div class="field-group">
        <label class="field-label" for="server-url-input">서버 URL</label>
        <input id="server-url-input" class="field-input" type="url" placeholder="https://shopaitry.vercel.app">
      </div>

      <button id="save-settings-btn" class="btn btn-primary">저장</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
